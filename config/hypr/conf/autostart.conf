# =====================================================
# Hyprland Autostart Configuration
# =====================================================

# Core System Services
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync
exec-once = swayosd-server --style ${HOME}/.config/swayosd/style.css --top-margin 0.9
exec-once = easyeffects --hide-window
exec-once = eww daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Clipboard Manager
exec-once = wl-paste --watch cliphist store

# Screen-time tracker (FocusTime)
exec-once = ${HOME}/.config/hypr/scripts/focustime-daemon.py

# Status Bar
exec-once = ${HOME}/dotfiles/config/waybar/launch.sh

# Dropdown terminal
exec-once = sleep 1 && kitty --class dropdown-terminal

# =====================================================
# Complex Logic (GTK, Wallpaper, etc.)
# =====================================================
exec-once = ${HOME}/dotfiles/config/hypr/scripts/autostart.sh
