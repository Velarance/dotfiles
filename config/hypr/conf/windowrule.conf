windowrule = tile on, match:title (^(Chromium)$)
windowrule = float on, match:title (^(pavucontrol)$)
windowrule = float on, match:title (^(nm-connection-editor)$)

# Dropdown terminal
windowrule = workspace special:dropdown silent, match:class (dropdown-terminal)
windowrule = float on, match:class (dropdown-terminal)
windowrule = size (monitor_w*0.80) (monitor_h*0.60), match:class (dropdown-terminal)
windowrule = center on, match:class (dropdown-terminal)

# Keybind cheatsheet (kitty sizes itself via initial_window_width/height)
windowrule = float on, match:class (cheatsheet)
windowrule = center on, match:class (cheatsheet)

# eww music popup — real compositor blur (frosts whatever is behind the popup, live)
layerrule = blur on, match:namespace (eww-music)
layerrule = ignore_alpha 0.4, match:namespace (eww-music)

# EasyEffects equalizer
windowrule = float on, match:class (org.kde.easyeffects)
windowrule = center on, match:class (org.kde.easyeffects)
windowrule = size 940 680, match:class (org.kde.easyeffects)

# Wlogout blur
layerrule = blur on, match:namespace (wlogout)
layerrule = ignore_alpha 0.3, match:namespace (wlogout)


# Dim screen behind rofi (as on desktop)
layerrule = dimaround, rofi
